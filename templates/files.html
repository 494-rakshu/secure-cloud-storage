<!DOCTYPE html>
<html>
<head>
    <title>My Files | Secure Cloud Storage</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        SecureCloud
    </div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>

</nav>

<div class="container">

    <h1>My Files</h1>

    <form method="GET" action="/files" style="margin-bottom:20px;">

        <input type="text"
               name="search"
               placeholder="Search files..."
               value="{{ search }}"
               style="padding:10px; width:250px; border-radius:5px;">

        <button type="submit" class="btn">
            Search
        </button>

    </form>

    {% if files %}

        {% for file in files %}

        <div class="card" style="margin-bottom:20px;">

            <p><strong>{{ file[0] }}</strong></p>

            {% if file[2] %}
            <p style="font-size:14px; color:#aaa;">
                Uploaded: {{ file[2] }}
            </p>
            {% endif %}

            <div style="display:flex; gap:10px; margin-top:10px;">

                <a href="{{ url_for('download_file', filename=file[1]) }}"
                   class="btn">
                    Download
                </a>

                <a href="/delete/{{ file[1] }}"
                   class="btn"
                   onclick="return confirm('Are you sure you want to delete this file?');">
                    Delete
                </a>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <p>No files uploaded yet.</p>

    {% endif %}

    <br>

    <a href="/dashboard"
       style="color:#64ffda;text-decoration:none;">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
