<!DOCTYPE html>
<html>
<head>
    <title>My Files | Secure Cloud Storage</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        SecureCloud
    </div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>

</nav>

<div class="container">

    <h1>My Files</h1>

    {% if files %}

        {% for file in files %}

            <div style="margin-bottom:15px;">

                <p>{{ file[0] }}</p>

                <a href="{{ url_for('download_file', filename=file[1]) }}"
                    class="btn"
                    style="display:inline-block;margin-top:10px;">
                    Download
                </a>

            </div>

        {% endfor %}   

    {% else %}

        <p>No files uploaded yet.</p>

    {% endif %}

    <br>

    <a href="/dashboard"
       style="color:#64ffda;text-decoration:none;">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
