<!DOCTYPE html>
<html>
<head>
    <title>Password Reset OTP | Secure Cloud Storage</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        SecureCloud
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
    </div>

</nav>

<div class="container">

    <h1>🔐 Password Reset Verification</h1>

    <p style="
        text-align:center;
        color:#b8c7e0;
        margin-bottom:25px;
        line-height:1.6;
    ">
        A password reset OTP has been sent to your registered
        email address.
        <br><br>
        Please enter the OTP below to continue resetting
        your password.
        <br><br>
        The OTP is valid for 2 minutes.
    </p>

    <form method="POST">

        <label>Reset OTP</label>

        <input
            type="text"
            name="otp"
            maxlength="6"
            placeholder="Enter 6-digit OTP"
            required>

        <button type="submit">
            Verify OTP
        </button>

    </form>

    <div style="
        margin-top:25px;
        text-align:center;
        color:#64ffda;
        font-size:14px;
    ">
        Password Recovery Verification
    </div>

</div>

</body>
</html>
