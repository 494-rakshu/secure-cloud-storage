<!DOCTYPE html>
<html>
<head>
    <title>Login | Secure Cloud Storage</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Login</h1>
    {% if session.get('message') %}
    <div style="
        background:#64ffda;
        color:#02131f;
        padding:12px;
        margin-bottom:20px;
        border-radius:10px;
        text-align:center;
        font-weight:600;
    ">
       {{ session.pop('message') }}
    </div>
    {% endif %}

    <form method="POST">

        <label>Email Address</label>

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        <label>Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <div style="text-align:center;">

        <a href="/forgot_password"
           style="color:#64ffda; text-decoration:none;">
            Forgot Password?
        </a>

        <br><br>

        <span style="color:#b8c7e0;">
            Don't have an account?
        </span>

        <a href="/register"
           style="color:#64ffda; text-decoration:none;">
            Register
        </a>

    </div>

</div>

</body>
</html>
