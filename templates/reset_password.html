<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | Secure Cloud Storage</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Reset Password</h1>

    <p style="
        text-align:center;
        color:#b8c7e0;
        margin-bottom:25px;
        line-height:1.6;
    ">
        Enter your new password below to complete the password reset process.
    </p>

    <form method="POST">

        <label>New Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter your new password"
            required>

        <button type="submit">
            Update Password
        </button>

    </form>

    <br>

    <div style="text-align:center;">

        <a href="/login"
           style="color:#64ffda; text-decoration:none;">
            Back to Login
        </a>

    </div>

</div>

</body>
</html>
